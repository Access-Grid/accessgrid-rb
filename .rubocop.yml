AllCops:
  SuggestExtensions: false

Metrics/BlockLength:
  Enabled: true
  Exclude:
    - 'spec/**/*'

Metrics/MethodLength:
  Enabled: true
  Exclude:
    - 'spec/**/*'

Naming/VariableNumber:
  Enabled: true
  EnforcedStyle: snake_case
  CheckMethodNames: true
  CheckSymbols: true

Style/Documentation:
    Enabled: false
